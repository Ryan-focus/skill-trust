name: Release & Publish Action

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Validate the bundle is present and tests pass before releasing
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify bundled action exists
        run: |
          if [ ! -f dist/action-bundle/index.js ]; then
            echo "::error::dist/action-bundle/index.js not found. Run 'npm run build:action' and commit the bundle before tagging a release."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest --run

      - name: Verify bundle is up to date
        run: |
          npm run build:action
          if git diff --exit-code dist/action-bundle/; then
            echo "Bundle is up to date."
          else
            echo "::error::Bundled action is out of date. Run 'npm run build:action' and commit the changes."
            exit 1
          fi

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update major version tag
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | grep -oP '^v\d+')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Update ${MAJOR} tag to ${GITHUB_REF_NAME}"
          git push origin "${MAJOR}" --force

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `skill-trust ${tag}`,
              generate_release_notes: true,
              make_latest: 'true',
            });
            console.log(`Release created: ${release.html_url}`);
