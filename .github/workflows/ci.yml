name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest --run

      - name: Build
        run: npm run build

      - name: Smoke test CLI
        run: |
          node dist/cli.js verify examples/trusted-skill --format json
          node dist/cli.js verify examples/untrusted-skill --format json || true

      - name: Bundle action
        run: npm run build:action

      - name: Verify action bundle is up to date
        run: |
          if git diff --exit-code dist/action-bundle/; then
            echo "Bundle is up to date."
          else
            echo "::warning::Action bundle is out of date. Run 'npm run build:action' and commit the changes."
          fi

      - name: Audit dependencies
        run: npm audit
